<!DOCTYPE html>
<html>
<head>
    <title>Hire Employee</title>
</head>

<body style="margin:0; font-family:Arial;
background:url('/static/images/bg.jpg') no-repeat center center fixed;
background-size:cover;
display:flex; justify-content:center; align-items:center; height:100vh;">

<div style="background:rgba(255,255,255,0.1);
padding:30px;
border-radius:10px;
backdrop-filter:blur(10px);
width:350px;
color:white;">

<h2 style="text-align:center;">Hire Employee</h2>

<form method="POST" style="display:flex; flex-direction:column;">

<input type="text" name="name" placeholder="Full Name" required style="padding:10px; margin-bottom:10px; border-radius:5px; border:none;">
<input type="email" name="email" placeholder="Email" required style="padding:10px; margin-bottom:10px; border-radius:5px; border:none;">
<input type="text" name="phone" placeholder="Phone" required style="padding:10px; margin-bottom:10px; border-radius:5px; border:none;">
<input type="text" name="position" placeholder="Position" required style="padding:10px; margin-bottom:10px; border-radius:5px; border:none;">
<input type="text" name="department" placeholder="Department" required style="padding:10px; margin-bottom:10px; border-radius:5px; border:none;">
<input type="number" name="salary" placeholder="Salary" required style="padding:10px; margin-bottom:10px; border-radius:5px; border:none;">
<input type="date" name="joining_date" required style="padding:10px; margin-bottom:15px; border-radius:5px; border:none;">

<button type="submit" style="padding:10px; background:#4CAF50; border:none; color:white; border-radius:5px;">
Hire Employee
</button>

</form>

</div>

</body>
</html>
