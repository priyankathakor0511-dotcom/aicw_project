<html>
<head>
</head>
<title>employees</title>
<link rel="stylesheet" href="/static/css/style.css">
<body>
    <div class="sidebar">...</div>

<div class="main">

<div class="glass">
<h2>Add Employee</h2>
<form action="/add_employee" method="POST">
<input name="name" placeholder="Name">
<input name="role" placeholder="Role">
<button>Add</button>
</form>
</div>

<div class="glass">
<h2>Search</h2>
<form action="/search">
<input name="q" placeholder="Search employee">
<button>Search</button>
</form>
</div>

<div class="glass">
<h2>Employee List</h2>
<table>
<tr><th>ID</th><th>Name</th><th>Role</th></tr>

{% for e in employees %}
<tr>
<td>{{e.id}}</td>
<td>{{e.name}}</td>
<td>{{e.role}}</td>
</tr>
{% endfor %}

</table>
</div>

</div>
</body>
</html>
